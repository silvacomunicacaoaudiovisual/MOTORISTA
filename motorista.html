<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Motorista - Frota Macapá</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .container { background: #151921; padding: 30px; border-radius: 15px; border: 1px solid #2d333b; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        h2 { color: #FFC107; margin-bottom: 25px; font-size: 24px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; background: #1c222d; border: 1px solid #30363d; border-radius: 8px; color: white; font-size: 18px; outline: none; text-align: center; }
        button { width: 100%; padding: 18px; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; background: #FFC107; color: #0b0e14; }
        button.active { background: #ff4444; color: white; }
        #status { margin-top: 20px; font-size: 14px; color: #8b949e; }
        .blink { animation: blinker 1.5s linear infinite; color: #00E676; font-weight: bold; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
<div class="container">
    <h2>MOTORISTA</h2>
    <input type="text" id="nome-motorista" placeholder="DIGITE SEU NOME">
    <button id="btn-transmissao">INICIAR RASTREIO</button>
    <div id="status">Status: <span>Offline</span></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDnZlax22oynZEuyDmUP7d-UuLEwqVLXWQ",
        databaseURL: "https://rastreio-macapa-default-rtdb.firebaseio.com",
        projectId: "rastreio-macapa",
        appId: "1:897295698995:web:2375c2d4b95b2eda712746"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let watchId = null;
    let wakeLock = null;

    async function manterAtivo() {
        if ('wakeLock' in navigator) {
            try { wakeLock = await navigator.wakeLock.request('screen'); } catch (err) {}
        }
    }

    document.getElementById('btn-transmissao').onclick = async function() {
        const btn = this;
        const nome = document.getElementById('nome-motorista').value.trim().toUpperCase();
        if(!nome) return alert("Digite seu nome!");
        const idLimpo = nome.replace(/\s+/g, '_');

        if(!watchId) {
            await manterAtivo();
            watchId = navigator.geolocation.watchPosition(pos => {
                db.ref('carros/' + idLimpo).set({
                    motorista: nome,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude,
                    speed: Math.round(pos.coords.speed * 3.6) || 0,
                    ultimaAtualizacao: new Date().toLocaleTimeString()
                });
                document.querySelector('#status span').innerText = "RASTREANDO...";
                document.querySelector('#status span').className = "blink";
                btn.innerText = "PARAR";
                btn.classList.add('active');
            }, (err) => alert("Ative o GPS!"), { enableHighAccuracy: true, maximumAge: 0 });
        } else {
            navigator.geolocation.clearWatch(watchId);
            watchId = null;
            if(wakeLock) wakeLock.release();
            location.reload();
        }
    };
</script>
</body>
</html>
