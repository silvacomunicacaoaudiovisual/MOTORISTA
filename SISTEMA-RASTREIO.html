<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frota Real - Mapa Profissional</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; display: flex; height: 100vh; color: white; overflow: hidden; }
        
        #frota-painel { width: 320px; background: #151921; padding: 20px; border-right: 1px solid #2d333b; overflow-y: auto; z-index: 1000; }
        #frota-painel h2 { color: #FFC107; margin-bottom: 20px; font-size: 22px; text-transform: uppercase; letter-spacing: 1px; }
        
        .carro-item { 
            background: #1c222d; padding: 15px; border-radius: 10px; margin-bottom: 12px; 
            border: 1px solid #30363d; cursor: pointer; transition: 0.3s;
        }
        .carro-item:hover { border-color: #FFC107; background: #252d3a; }
        .carro-item .nome { color: #FFC107; font-weight: bold; font-size: 16px; margin-bottom: 5px; }
        .carro-item .speed { color: #00E676; font-size: 15px; font-weight: bold; }
        .carro-item .status { font-size: 12px; color: #8b949e; margin-top: 5px; }
        
        #map { flex: 1; height: 100%; }
    </style>
</head>
<body>

<div id="frota-painel">
    <h2>Frota Real</h2>
    <div id="lista-carros">
        <p style="color: #8b949e; font-size: 14px;">Buscando motoristas...</p>
    </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyDnZlax22oynZEuyDmUP7d-UuLEwqVLXWQ",
        databaseURL: "https://rastreio-macapa-default-rtdb.firebaseio.com",
        projectId: "rastreio-macapa",
        appId: "1:897295698995:web:2375c2d4b95b2eda712746"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const map = L.map('map').setView([-0.0355, -51.0705], 14);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: '© Frota Real Macapá'
    }).addTo(map);

    // --- TAMANHO CORRIGIDO AQUI ---
    const carIcon = L.icon({
        iconUrl: 'carro.png', 
        iconSize: [20, 40],    // Largura 30px, Altura 40px (Equilibrado)
        iconAnchor: [20, 40],  // Ponto central de fixação
        popupAnchor: [0, -35]  
    });

    const markers = {};

    db.ref('carros').on('value', snapshot => {
        const data = snapshot.val();
        const listaHTML = document.getElementById('lista-carros');
        
        if (data) {
            listaHTML.innerHTML = ''; 
            for (const id in data) {
                const carro = data[id];
                const nome = carro.motorista;
                const latlng = [carro.lat, carro.lng];
                const velocidade = carro.speed || 0;
                const hora = carro.ultimaAtualizacao || '';

                if (markers[id]) {
                    markers[id].setLatLng(latlng).setPopupContent(`<b>${nome}</b><br>${velocidade} km/h`);
                } else {
                    markers[id] = L.marker(latlng, { icon: carIcon }).addTo(map)
                        .bindPopup(`<b>${nome}</b><br>${velocidade} km/h`);
                }

                const item = document.createElement('div');
                item.className = 'carro-item';
                item.innerHTML = `
                    <div class="nome">${nome}</div>
                    <div class="speed">${velocidade} km/h</div>
                    <div class="status">Visto às: ${hora}</div>
                `;
                
                item.onclick = () => {
                    map.setView(latlng, 17);
                    markers[id].openPopup();
                };
                listaHTML.appendChild(item);
            }
        }
    });
</script>
</body>
</html>
